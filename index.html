<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fat Loss Diet Plan Creator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
            <h1>Fat Loss Plan Creator</h1>
            <p>Get a personalized Kerala-style diet plan in seconds.</p>
        </header>

        <main>
            <form id="dietForm" class="glass-panel">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" required min="10" max="100" placeholder="Years">
                    </div>

                    <div class="input-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" required min="30" max="250" step="0.1" placeholder="Kg">
                    </div>

                    <div class="input-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" required min="100" max="250" placeholder="Cm">
                    </div>

                    <div class="input-group">
                        <label for="activity">Activity Level</label>
                        <select id="activity" required>
                            <option value="1.2">Sedentary (Little/no exercise)</option>
                            <option value="1.375">Lightly Active (1-3 days/week)</option>
                            <option value="1.55">Moderately Active (3-5 days/week)</option>
                            <option value="1.725">Very Active (6-7 days/week)</option>
                            <option value="1.9">Super Active (Physical job)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="preference">Food Preference</label>
                        <select id="preference" required>
                            <option value="non-veg">Non-Vegetarian</option>
                            <option value="veg">Vegetarian</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <label for="goal">Goal Speed (kg/week)</label>
                        <div class="range-container">
                            <input type="range" id="goal" min="0.25" max="1.0" step="0.25" value="0.5"
                                oninput="goalOutput.value = this.value + ' kg/week'">
                            <output id="goalOutput">0.5 kg/week</output>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Generate My Plan</button>
                </div>
            </form>

            <div id="results" class="results-container hidden">
                <div class="stats-grid">
                    <div class="stat-card glass-panel">
                        <h3>Daily Calories</h3>
                        <div class="stat-value" id="calorieTarget">0</div>
                        <div class="stat-label">kcal</div>
                    </div>
                    <div class="stat-card glass-panel">
                        <h3>Water Intake</h3>
                        <div class="stat-value" id="waterIntake">0</div>
                        <div class="stat-label">Liters/day</div>
                    </div>
                </div>

                <div id="weeklyPlan" class="weekly-plan">
                    <!-- Plan will be injected here -->
                </div>

                <div id="grocerySection" class="grocery-section">
                    <h2>Shopping List</h2>
                    <p class="subtitle">Ingredients for your weekly plan</p>
                    <div id="groceryListContainer" class="grocery-grid">
                        <!-- Grocery items will be injected here -->
                    </div>
                </div>

                <div class="action-area">
                    <button id="regenerateBtn" class="btn-secondary">Regenerate Plan</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Not medical advice. Consult a doctor before starting any diet.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
